<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
</head>
<body>
   <header class="d-flex justify-content-center py-3">
      <ul class="nav nav-pills">
        {% if user.is_authenticated %}
        <li class="nav-item"><a href="{% url 'signout' %}" class="nav-link">signout</a></li>
        <li class="nav-item"><a href="{% url 'catalog' %}" class="nav-link">catalog</a></li>
        <li class="nav-item"><a href="{% url 'orders' %}" class="nav-link">orders</a></li>
        {% else %}
        <li class="nav-item"><a href="{% url 'signin' %}" class="nav-link">signin</a></li>
        <li class="nav-item"><a href="{% url 'signup' %}" class="nav-link">signup</a></li>
        {% endif %}
        <li class="nav-item"><a href="#" class="nav-link active" aria-current="page">Home</a></li>
        <li class="nav-item"><a href="#" class="nav-link">FAQs</a></li>
        <li class="nav-item"><a href="#" class="nav-link">About</a></li>
      </ul>
    </header>
    {% if error %}
        <p class="text-center text-danger fw bold">
         {{error}}
        </p>
    {% endif %}
<form method="post">
{% csrf_token %}
<input class="form-control"type="text" name="username" placeholder="Username"id="username" required>
<label for="username">
Username
</label>
<input class="form-control"type="text" name="email" placeholder="Email"id="email" required>
<label for="email">
Email
</label>
<input class="form-control"type="text" name="password" placeholder="Password"id="password" required>
<label for="password">
Password
</label>
<input class="form-control"type="text" name="r_password" placeholder="R_password"id="r_password" required>
<label for="r_password">
R_password
</label>
<button type="submit">
Register
</button>
</form>
</body>
</html>
